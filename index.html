<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Intervals">
<title>Interval Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Outfit', -apple-system, sans-serif;
    color: #e0e0e0;
    background: #0a0a0a;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  #app {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    transition: background 0.8s ease;
  }

  .bg-idle { background: linear-gradient(165deg, #0a0a0a 0%, #0a0a1a 40%, #0f0f2d 100%); }
  .bg-run  { background: linear-gradient(165deg, #0a0a0a 0%, #1a0a0a 40%, #2d0f0f 100%); }
  .bg-rest { background: linear-gradient(165deg, #0a0a0a 0%, #0a1a0a 40%, #0f2d1a 100%); }

  .header {
    font-size: 13px; font-weight: 600;
    letter-spacing: 6px; text-transform: uppercase;
    color: #555; margin: 10px 0 8px;
  }

  /* Setup screen */
  .setup { display: flex; flex-direction: column; align-items: center; gap: 28px; margin-top: 40px; width: 100%; max-width: 340px; }

  .input-block { width: 100%; text-align: center; }
  .input-label { font-size: 11px; font-weight: 600; letter-spacing: 4px; margin-bottom: 10px; }
  .input-label.run { color: #ff4444; }
  .input-label.rest { color: #44cc66; }

  .time-input {
    width: 180px; height: 60px; border-radius: 12px;
    background: rgba(255,255,255,0.04); color: #fff;
    font-family: 'Space Mono', monospace; font-size: 32px; font-weight: 700;
    text-align: center; border: 1px solid rgba(255,255,255,0.08);
  }
  .time-input:focus { outline: none; }
  .time-input.run { border-color: rgba(255,68,68,0.2); caret-color: #ff4444; }
  .time-input.rest { border-color: rgba(68,204,102,0.2); caret-color: #44cc66; }

  .input-hint { font-family: 'Space Mono', monospace; font-size: 10px; color: #444; margin-top: 4px; letter-spacing: 1px; }

  .rounds-label { font-size: 11px; font-weight: 600; letter-spacing: 4px; color: #888; margin-bottom: 10px; }
  .rounds-row { display: flex; align-items: center; justify-content: center; gap: 20px; }
  .rounds-value { font-family: 'Space Mono', monospace; font-size: 42px; font-weight: 700; color: #fff; min-width: 60px; text-align: center; }
  .round-btn {
    width: 44px; height: 44px; border-radius: 22px;
    border: 1px solid #333; background: rgba(255,255,255,0.05);
    color: #aaa; font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Outfit', sans-serif;
  }

  .start-btn {
    margin-top: 16px; width: 220px; height: 56px; border-radius: 28px; border: none;
    background: linear-gradient(135deg, #ff4444 0%, #cc2222 100%);
    color: #fff; font-family: 'Outfit', sans-serif; font-size: 16px;
    font-weight: 800; letter-spacing: 5px; text-transform: uppercase;
    cursor: pointer; box-shadow: 0 4px 30px rgba(255,68,68,0.3);
    transition: transform 0.15s; -webkit-appearance: none;
  }
  .start-btn:active { transform: scale(0.96); }

  /* Active screen */
  .active { display: flex; flex-direction: column; align-items: center; margin-top: 12px; width: 100%; max-width: 400px; }

  .phase-label {
    font-size: 18px; font-weight: 800; letter-spacing: 8px;
    text-transform: uppercase; margin-bottom: 8px; transition: color 0.4s;
  }
  .phase-label.run { color: #ff4444; }
  .phase-label.rest { color: #44cc66; }

  .round-info { font-family: 'Space Mono', monospace; font-size: 13px; color: #666; letter-spacing: 2px; margin-bottom: 20px; }

  .ring-container { position: relative; width: 280px; height: 280px; margin-bottom: 24px; }
  .ring-svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: #1a1a1a; stroke-width: 6; }
  .ring-progress { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 0.3s linear, stroke 0.4s; }
  .ring-progress.run { stroke: #ff4444; }
  .ring-progress.rest { stroke: #44cc66; }

  .center-time {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center;
  }
  .remaining-value { font-family: 'Space Mono', monospace; font-size: 52px; font-weight: 700; color: #fff; line-height: 1; }
  .remaining-label { font-size: 11px; color: #555; letter-spacing: 3px; margin-top: 8px; }

  .stats { display: flex; gap: 32px; margin-bottom: 32px; }
  .stat-value { font-family: 'Space Mono', monospace; font-size: 24px; font-weight: 700; color: #ccc; }
  .stat-label { font-size: 10px; letter-spacing: 3px; color: #555; margin-top: 4px; }

  .controls { display: flex; gap: 16px; }
  .ctrl-btn {
    width: 120px; height: 48px; border-radius: 24px; border: none;
    font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600;
    letter-spacing: 3px; text-transform: uppercase; cursor: pointer;
    transition: transform 0.1s; -webkit-appearance: none;
  }
  .ctrl-btn:active { transform: scale(0.95); }
  .ctrl-pause { background: rgba(255,255,255,0.08); color: #fff; }
  .ctrl-resume-run { background: #ff4444; color: #fff; }
  .ctrl-resume-rest { background: #44cc66; color: #fff; }
  .ctrl-stop { background: rgba(255,255,255,0.05); color: #777; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="app" class="bg-idle">
  <div class="header">Interval Timer</div>

  <!-- SETUP -->
  <div id="setup" class="setup">
    <div class="input-block">
      <div class="input-label run">RUN</div>
      <input id="runInput" class="time-input run" type="text" value="2:50" inputmode="numeric">
      <div class="input-hint">min:sec</div>
    </div>
    <div class="input-block">
      <div class="input-label rest">REST</div>
      <input id="restInput" class="time-input rest" type="text" value="4:00" inputmode="numeric">
      <div class="input-hint">min:sec</div>
    </div>
    <div class="input-block">
      <div class="rounds-label">ROUNDS</div>
      <div class="rounds-row">
        <button id="roundMinus" class="round-btn">−</button>
        <span id="roundsValue" class="rounds-value">6</span>
        <button id="roundPlus" class="round-btn">+</button>
      </div>
    </div>
    <button id="startBtn" class="start-btn">Start</button>
  </div>

  <!-- ACTIVE -->
  <div id="active" class="active hidden">
    <div id="phaseLabel" class="phase-label run">RUN</div>
    <div id="roundInfo" class="round-info">ROUND 1 / 6</div>

    <div class="ring-container">
      <svg class="ring-svg" width="280" height="280" viewBox="0 0 280 280">
        <circle class="ring-bg" cx="140" cy="140" r="130"/>
        <circle id="ringProgress" class="ring-progress run" cx="140" cy="140" r="130"
          stroke-dasharray="816.81" stroke-dashoffset="816.81"/>
      </svg>
      <div class="center-time">
        <div id="remainingValue" class="remaining-value">2:50</div>
        <div class="remaining-label">REMAINING</div>
      </div>
    </div>

    <div class="stats">
      <div style="text-align:center">
        <div id="periodElapsed" class="stat-value">0:00</div>
        <div class="stat-label">PERIOD</div>
      </div>
      <div style="text-align:center">
        <div id="totalElapsed" class="stat-value">0:00</div>
        <div class="stat-label">TOTAL</div>
      </div>
    </div>

    <div class="controls">
      <button id="pauseBtn" class="ctrl-btn ctrl-pause">Pause</button>
      <button id="stopBtn" class="ctrl-btn ctrl-stop">Stop</button>
    </div>
  </div>
</div>

<script>
const $ = (s) => document.getElementById(s);
const app = $("app");
const circumference = 2 * Math.PI * 130;

let runDuration = 0, restDuration = 0, totalRounds = 6;
let phase = "run", currentRound = 1;
let periodSecs = 0, totalSecs = 0;
let timerInterval = null;
let state = "idle"; // idle | running | paused
let audioCtx = null;

function parseTime(str) {
  const p = str.split(":").map(Number);
  if (p.length === 2 && !isNaN(p[0]) && !isNaN(p[1])) return p[0] * 60 + p[1];
  if (p.length === 1 && !isNaN(p[0])) return p[0] * 60;
  return null;
}

function fmt(s) {
  return Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0");
}

function beep(freq, dur, count) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  for (let i = 0; i < count; i++) {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = freq; o.type = "square"; g.gain.value = 0.15;
    const t = audioCtx.currentTime + i * 0.22;
    o.start(t); o.stop(t + dur / 1000);
  }
}

function curDuration() { return phase === "run" ? runDuration : restDuration; }

function render() {
  const isRun = phase === "run";
  const dur = curDuration();
  const remaining = Math.max(0, dur - periodSecs);
  const progress = dur > 0 ? periodSecs / dur : 0;

  app.className = state === "idle" ? "bg-idle" : isRun ? "bg-run" : "bg-rest";

  $("phaseLabel").textContent = phase.toUpperCase();
  $("phaseLabel").className = "phase-label " + phase;
  $("roundInfo").textContent = "ROUND " + currentRound + " / " + totalRounds;
  $("remainingValue").textContent = fmt(remaining);
  $("periodElapsed").textContent = fmt(periodSecs);
  $("totalElapsed").textContent = fmt(totalSecs);

  const ring = $("ringProgress");
  ring.className.baseVal = "ring-progress " + phase;
  ring.style.strokeDashoffset = circumference * (1 - progress);

  // Pause/resume button
  const pb = $("pauseBtn");
  if (state === "running") {
    pb.textContent = "Pause";
    pb.className = "ctrl-btn ctrl-pause";
  } else {
    pb.textContent = "Resume";
    pb.className = "ctrl-btn " + (isRun ? "ctrl-resume-run" : "ctrl-resume-rest");
  }
}

function tick() {
  periodSecs++;
  totalSecs++;

  if (periodSecs >= curDuration()) {
    if (phase === "run") {
      beep(660, 200, 2);
      phase = "rest";
      periodSecs = 0;
    } else {
      if (currentRound >= totalRounds) {
        beep(1100, 120, 4);
        stop();
        return;
      }
      beep(880, 150, 3);
      currentRound++;
      phase = "run";
      periodSecs = 0;
    }
  }
  render();
}

function stop() {
  clearInterval(timerInterval); timerInterval = null;
  state = "idle"; phase = "run";
  currentRound = 1; periodSecs = 0; totalSecs = 0;
  $("setup").classList.remove("hidden");
  $("active").classList.add("hidden");
  app.className = "bg-idle";
}

// Events
$("roundMinus").onclick = () => { totalRounds = Math.max(1, totalRounds - 1); $("roundsValue").textContent = totalRounds; };
$("roundPlus").onclick  = () => { totalRounds++; $("roundsValue").textContent = totalRounds; };

$("startBtn").onclick = () => {
  const rd = parseTime($("runInput").value);
  const rs = parseTime($("restInput").value);
  if (!rd || !rs || rd <= 0 || rs <= 0) return;

  runDuration = rd; restDuration = rs;
  phase = "run"; currentRound = 1; periodSecs = 0; totalSecs = 0;
  state = "running";

  beep(880, 150, 2);

  $("setup").classList.add("hidden");
  $("active").classList.remove("hidden");
  render();

  clearInterval(timerInterval);
  timerInterval = setInterval(tick, 1000);
};

$("pauseBtn").onclick = () => {
  if (state === "running") {
    clearInterval(timerInterval); timerInterval = null;
    state = "paused";
  } else if (state === "paused") {
    state = "running";
    timerInterval = setInterval(tick, 1000);
  }
  render();
};

$("stopBtn").onclick = stop;
</script>
</body>
</html>
